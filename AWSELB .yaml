AWSTemplateFormatVersion: '2010-09-09'
Description: ALB Path-Based Routing Lab - Fixed & Production-Ready

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id

  PublicSubnet1A:
    Type: AWS::EC2::Subnet::Id

  PublicSubnet1C:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnet1A:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnet1C:
    Type: AWS::EC2::Subnet::Id

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]

Resources:

# ─────────────────────────────
# SECURITY GROUPS
# ─────────────────────────────

  PublicLoadBalancerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppASG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App A SG
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref PublicLoadBalancerSG
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App B SG
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref PublicLoadBalancerSG
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

# ─────────────────────────────
# EC2 INSTANCES
# ─────────────────────────────

  AppAInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet1A
      SecurityGroupIds:
        - !Ref AppASG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          mkdir -p /var/www/html/a
          echo "<h1>App A - Instance 1</h1>" > /var/www/html/a/index.html
          echo "<h1>App A Root OK</h1>" > /var/www/html/index.html

  AppAInstance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet1A
      SecurityGroupIds:
        - !Ref AppASG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          mkdir -p /var/www/html/a
          echo "<h1>App A - Instance 2</h1>" > /var/www/html/a/index.html
          echo "<h1>App A Root OK</h1>" > /var/www/html/index.html

  AppBInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet1C
      SecurityGroupIds:
        - !Ref AppBSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          mkdir -p /var/www/html/b
          echo "<h1>App B</h1>" > /var/www/html/b/index.html
          echo "<h1>App B Root OK</h1>" > /var/www/html/index.html

# ─────────────────────────────
# TARGET GROUPS
# ─────────────────────────────

  TargetGroupA:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: tg-app-a
      TargetType: instance
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VPCId
      HealthCheckPath: /a/
      Matcher:
        HttpCode: '200'
      Targets:
        - Id: !Ref AppAInstance1
          Port: 80
        - Id: !Ref AppAInstance2
          Port: 80

  TargetGroupB:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: tg-app-b
      TargetType: instance
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VPCId
      HealthCheckPath: /b/
      Matcher:
        HttpCode: '200'
      Targets:
        - Id: !Ref AppBInstance1
          Port: 80

# ─────────────────────────────
# ALB
# ─────────────────────────────

  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ez-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1A
        - !Ref PublicSubnet1C
      SecurityGroups:
        - !Ref PublicLoadBalancerSG

# ─────────────────────────────
# LISTENER + ROUTING
# ─────────────────────────────

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '503'
            ContentType: text/plain
            MessageBody: "Invalid path"

  ListenerRuleA:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values: [/a/*]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupA

  ListenerRuleB:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 2
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values: [/b/*]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupB

# ─────────────────────────────
# OUTPUTS
# ─────────────────────────────

Outputs:
  ALBDNS:
    Value: !GetAtt AppLoadBalancer.DNSName